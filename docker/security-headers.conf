# Shared security headers. Included in every location that sets its own
# add_header (nginx drops inherited add_headers when a location adds any).
#
# CSP uses 'unsafe-inline' for script/style: the site is fronted by Cloudflare
# (luimnae.com) which rewrites inline scripts, so a hash/nonce CSP breaks. The
# site is fully static with no user input or auth, so inline-script XSS risk is
# negligible. script-src/style-src 'self' 'unsafe-inline'; everything else locked.
add_header X-Content-Type-Options   "nosniff"                          always;
add_header X-Frame-Options          "SAMEORIGIN"                       always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'" always;
