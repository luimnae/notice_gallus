# Shared security headers. Included in every location that sets its own
# add_header (nginx drops inherited add_headers when a location adds any).
#
# NOTE: Content-Security-Policy is intentionally NOT set here. Astro emits a
# per-page <meta> CSP with build-time sha256 hashes for its inline scripts/
# styles (see astro.config.mjs experimental.csp). Sending a second CSP from
# nginx would intersect with Astro's and strip those hashes, breaking JS.
add_header X-Content-Type-Options   "nosniff"                          always;
add_header X-Frame-Options          "SAMEORIGIN"                       always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
