# Gallus Guide — production nginx server block (static Astro output)

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Compression ──
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        image/svg+xml font/woff2 application/wasm;

    # Security headers (server-level default; re-included per location below
    # because nginx drops inherited add_headers wherever a location adds its own).
    include /etc/nginx/security-headers.conf;

    # ── Hashed, immutable build assets (Astro emits /_assets/*.[hash].*) ──
    location /_assets/ {
        include /etc/nginx/security-headers.conf;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # Static media & fonts
    location ~* \.(?:woff2|woff|ttf|otf|webp|png|jpe?g|svg|ico)$ {
        include /etc/nginx/security-headers.conf;
        expires    30d;
        add_header Cache-Control "public";
        access_log off;
        try_files  $uri =404;
    }

    # ── HTML: always revalidate (cheap, keeps deploys instant) ──
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
        # Resolve clean URLs + directory index (/pose-fenetre/ -> /pose-fenetre/index.html).
        # Unknown paths fall through to @notfound so they return a real 404 status.
        try_files $uri $uri/ $uri.html @notfound;
    }

    location @notfound {
        return 404;
    }

    # ── Custom 404 page, served with a 404 status ──
    error_page 404 /404.html;
    location = /404.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
        internal;
    }
}
